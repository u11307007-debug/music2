<!DOCTYPE html>
<html lang="zh-Hant" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>03-02 顏色追蹤</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>body { font-family: Inter, sans-serif; }</style>
  </head>
  <body class="min-h-screen bg-slate-950 p-6 text-slate-100">
    <a class="text-cyan-400 hover:text-lime-400" href="index.html">← 返回課程表</a>
    <div class="mx-auto mt-6 max-w-3xl">
      <h1 class="mb-4 text-xl font-semibold">練習 03-02｜顏色控制音樂</h1>
      <p class="mb-2 text-sm text-slate-400">
        偵測紅色 RGB = (182, 15, 10) 時播放 <code>music.mp3</code>；偵測黃色 RGB = (164, 167, 0) 時，
        依黃色在畫面上下方位調整音量（越上方越大聲）。
      </p>
      <div class="mb-4 flex flex-wrap gap-2">
        <button id="calib-red" class="rounded-xl border border-rose-400/50 bg-rose-500/10 px-4 py-2 text-sm text-rose-200">
          現場校正紅色
        </button>
        <button id="calib-green" class="rounded-xl border border-yellow-400/50 bg-yellow-500/10 px-4 py-2 text-sm text-yellow-200">
          現場校正黃色
        </button>
      </div>
      <button id="start" class="mb-4 rounded-xl border border-cyan-400/50 bg-cyan-500/10 px-4 py-2 text-sm text-cyan-200">
        開啟攝影機
      </button>
      <div class="relative inline-block">
        <video id="video" class="hidden" playsinline muted></video>
        <canvas id="canvas" class="max-h-[70vh] rounded-lg border border-cyan-500/30 bg-black"></canvas>
      </div>
      <p id="status" class="mt-4 rounded-lg border border-slate-700 bg-slate-900/80 p-3 text-sm text-slate-300">
        平均 RGB：—　距離：—
      </p>
    </div>
    <audio id="music" src="music.mp3" loop preload="auto"></audio>
    <script>
      const DEFAULT_RED_TARGET = { r: 182, g: 15, b: 10 };
      const DEFAULT_GREEN_TARGET = { r: 164, g: 167, b: 0 };
      const DIST_MAX = 45;
      const MIN_PIXELS = 80;
      const STEP = 2;
      const TRACK_BOX_RATIO = 0.2;
      const SAT_MIN = 0.2;
      const VAL_MIN = 0.15;
      const HUE_TOLERANCE = 18;
      const RED_SAT_MIN = 0.42;
      const RED_DOMINANCE_MIN = 28;
      const RED_RATIO_MIN = 1.35;
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const statusEl = document.getElementById("status");
      const music = document.getElementById("music");
      const calibRedBtn = document.getElementById("calib-red");
      const calibGreenBtn = document.getElementById("calib-green");
      let hasStarted = false;
      let isPlaying = false;
      let prevRedDetected = false;
      let redCalibrated = false;
      let greenCalibrated = false;
      let redHue = 0;
      let greenHue = 60;
      let pendingCalibration = null;
      let calibrationPromptShown = false;

      function euclidean(a, b) {
        return Math.sqrt((a.r - b.r) ** 2 + (a.g - b.g) ** 2 + (a.b - b.b) ** 2);
      }

      function rgbToHsv(pixel) {
        const r = pixel.r / 255;
        const g = pixel.g / 255;
        const b = pixel.b / 255;
        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const d = max - min;
        let h = 0;
        if (d !== 0) {
          if (max === r) h = 60 * (((g - b) / d) % 6);
          else if (max === g) h = 60 * ((b - r) / d + 2);
          else h = 60 * ((r - g) / d + 4);
        }
        if (h < 0) h += 360;
        const s = max === 0 ? 0 : d / max;
        const v = max;
        return { h, s, v };
      }

      function hueDiff(a, b) {
        const d = Math.abs(a - b);
        return Math.min(d, 360 - d);
      }

      function looksLikeSkin(hsv, pixel) {
        return (
          hsv.h >= 5 &&
          hsv.h <= 45 &&
          hsv.s >= 0.15 &&
          hsv.s <= 0.68 &&
          hsv.v >= 0.2 &&
          pixel.r > pixel.g &&
          pixel.g > pixel.b
        );
      }

      function hsvTargetFromRgb(rgb) {
        return rgbToHsv(rgb).h;
      }

      function sampleCenterAverageRgb() {
        if (!hasStarted || !video.videoWidth) return null;
        const rw = Math.floor(canvas.width * 0.12);
        const rh = Math.floor(canvas.height * 0.12);
        const rx = Math.floor((canvas.width - rw) / 2);
        const ry = Math.floor((canvas.height - rh) / 2);
        const img = ctx.getImageData(rx, ry, rw, rh);
        const d = img.data;
        let sr = 0;
        let sg = 0;
        let sb = 0;
        let n = 0;
        for (let i = 0; i < d.length; i += 4) {
          sr += d[i];
          sg += d[i + 1];
          sb += d[i + 2];
          n++;
        }
        if (n === 0) return null;
        return { r: sr / n, g: sg / n, b: sb / n };
      }

      function isRed(pixel) {
        const hsv = rgbToHsv(pixel);
        const hueOk = hueDiff(hsv.h, redHue) <= HUE_TOLERANCE;
        const dominance = pixel.r - Math.max(pixel.g, pixel.b);
        const ratio = pixel.r / (pixel.g + pixel.b + 1);
        return (
          hueOk &&
          hsv.s >= RED_SAT_MIN &&
          hsv.v >= VAL_MIN &&
          dominance >= RED_DOMINANCE_MIN &&
          ratio >= RED_RATIO_MIN &&
          pixel.r > pixel.g &&
          pixel.r > pixel.b &&
          !looksLikeSkin(hsv, pixel)
        );
      }

      function isGreen(pixel) {
        const hsv = rgbToHsv(pixel);
        const hueOk = hueDiff(hsv.h, greenHue) <= HUE_TOLERANCE;
        const rgMin = Math.min(pixel.r, pixel.g);
        return (
          hueOk &&
          hsv.s >= SAT_MIN &&
          hsv.v >= VAL_MIN &&
          pixel.b < rgMin - 15 &&
          Math.abs(pixel.r - pixel.g) < 90 &&
          !looksLikeSkin(hsv, pixel)
        );
      }

      function isCalibrationCandidate(pixel, color) {
        const hsv = rgbToHsv(pixel);
        if (hsv.s < SAT_MIN || hsv.v < VAL_MIN) return false;
        if (color === "red") {
          const dominance = pixel.r - Math.max(pixel.g, pixel.b);
          const ratio = pixel.r / (pixel.g + pixel.b + 1);
          return (
            pixel.r > pixel.g + 20 &&
            pixel.r > pixel.b + 20 &&
            hsv.s >= RED_SAT_MIN &&
            dominance >= RED_DOMINANCE_MIN &&
            ratio >= RED_RATIO_MIN &&
            !looksLikeSkin(hsv, pixel)
          );
        }
        return (
          pixel.r > pixel.b + 20 &&
          pixel.g > pixel.b + 20 &&
          Math.abs(pixel.r - pixel.g) < 90 &&
          !looksLikeSkin(hsv, pixel)
        );
      }

      async function toggleMusic() {
        try {
          if (isPlaying) {
            music.pause();
            isPlaying = false;
          } else {
            await music.play();
            isPlaying = true;
          }
        } catch (err) {
          statusEl.textContent = "播放失敗：請確認 music.mp3 存在，並再次點擊開始。";
        }
      }

      function drawTrackingBox(cx, cy, color) {
        const rw = Math.floor(canvas.width * TRACK_BOX_RATIO);
        const rh = Math.floor(canvas.height * TRACK_BOX_RATIO);
        const rx = Math.max(0, Math.min(canvas.width - rw, Math.round(cx - rw / 2)));
        const ry = Math.max(0, Math.min(canvas.height - rh, Math.round(cy - rh / 2)));
        ctx.strokeStyle = color;
        ctx.lineWidth = 3;
        ctx.strokeRect(rx, ry, rw, rh);
      }

      function loop() {
        requestAnimationFrame(loop);
        if (!hasStarted || !video.videoWidth) return;

        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const d = img.data;
        const w = canvas.width;
        const h = canvas.height;

        let redCount = 0;
        let redSx = 0;
        let redSy = 0;
        let greenCount = 0;
        let greenSx = 0;
        let greenSy = 0;
        let calibCount = 0;
        let calibSx = 0;
        let calibSy = 0;
        let calibSr = 0;
        let calibSg = 0;
        let calibSb = 0;

        for (let y = 0; y < h; y += STEP) {
          for (let x = 0; x < w; x += STEP) {
            const idx = (y * w + x) * 4;
            const pixel = { r: d[idx], g: d[idx + 1], b: d[idx + 2] };
            if (isRed(pixel)) {
              redCount++;
              redSx += x;
              redSy += y;
            }
            if (isGreen(pixel)) {
              greenCount++;
              greenSx += x;
              greenSy += y;
            }
            if (pendingCalibration && isCalibrationCandidate(pixel, pendingCalibration)) {
              calibCount++;
              calibSx += x;
              calibSy += y;
              calibSr += pixel.r;
              calibSg += pixel.g;
              calibSb += pixel.b;
            }
          }
        }

        const redDetected = redCount >= MIN_PIXELS;
        const greenDetected = greenCount >= MIN_PIXELS;

        if (redDetected && !prevRedDetected) {
          toggleMusic();
        }
        prevRedDetected = redDetected;

        if (redDetected) {
          const redCx = redSx / redCount;
          const redCy = redSy / redCount;
          drawTrackingBox(redCx, redCy, "rgba(248, 113, 113, 0.95)");
        }

        if (greenDetected) {
          const greenCx = greenSx / greenCount;
          const greenCy = greenSy / greenCount;
          drawTrackingBox(greenCx, greenCy, "rgba(250, 204, 21, 0.95)");
          const volume = Math.max(0, Math.min(1, 1 - greenCy / h));
          music.volume = volume;
          statusEl.className = "mt-4 rounded-lg border border-yellow-400/60 bg-yellow-950/40 p-3 text-sm text-yellow-200";
          statusEl.textContent =
            "音樂狀態：" +
            (isPlaying ? "播放中" : "已暫停") +
            "｜紅色：" +
            (redDetected ? "已偵測" : "未偵測") +
            "｜黃色音量控制啟用，音量：" +
            Math.round(volume * 100) +
            "%";
        } else {
          statusEl.className =
            "mt-4 rounded-lg border p-3 text-sm " +
            (redDetected
              ? "border-cyan-400/60 bg-cyan-950/40 text-cyan-200"
              : "border-slate-700 bg-slate-900/80 text-slate-300");
          statusEl.textContent =
            "音樂狀態：" +
            (isPlaying ? "播放中" : "已暫停") +
            "｜紅色：" +
            (redDetected ? "已偵測" : "未偵測") +
            "｜黃色：" +
            (greenDetected ? "已偵測" : "未偵測") +
            "｜目前音量 " +
            Math.round(music.volume * 100) +
            "%";
        }

        if (pendingCalibration) {
          if (calibCount >= MIN_PIXELS) {
            const calibCx = calibSx / calibCount;
            const calibCy = calibSy / calibCount;
            drawTrackingBox(calibCx, calibCy, "rgba(250, 204, 21, 0.95)");
            if (!calibrationPromptShown) {
              calibrationPromptShown = true;
              const avg = {
                r: calibSr / calibCount,
                g: calibSg / calibCount,
                b: calibSb / calibCount,
              };
              const confirmText =
                "偵測到" +
                (pendingCalibration === "red" ? "紅色" : "黃色") +
                "，是否改用目前顏色作為校正值？";
              const accept = window.confirm(confirmText);
              if (accept) {
                const h = rgbToHsv(avg).h;
                if (pendingCalibration === "red") {
                  redHue = h;
                  redCalibrated = true;
                } else {
                  greenHue = h;
                  greenCalibrated = true;
                }
                showCalibrationState((pendingCalibration === "red" ? "紅色" : "黃色") + "校正完成");
              } else {
                showCalibrationState("已取消本次校正");
              }
              pendingCalibration = null;
            }
          } else {
            calibrationPromptShown = false;
            statusEl.className = "mt-4 rounded-lg border border-amber-400/70 bg-amber-950/50 p-3 text-sm text-amber-200";
            statusEl.textContent =
              "校正模式：" +
              (pendingCalibration === "red" ? "紅色" : "黃色") +
              "（請把目標顏色放入畫面，偵測框會跟著移動）";
          }
        }
      }

      function showCalibrationState(prefix) {
        const text =
          prefix +
          "｜紅色校正：" +
          (redCalibrated ? redHue.toFixed(1) + "°" : "未校正") +
          "｜黃色校正：" +
          (greenCalibrated ? greenHue.toFixed(1) + "°" : "未校正");
        statusEl.className = "mt-4 rounded-lg border border-cyan-400/60 bg-cyan-950/40 p-3 text-sm text-cyan-200";
        statusEl.textContent = text;
      }

      document.getElementById("start").addEventListener("click", async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
          video.srcObject = stream;
          await video.play();
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          hasStarted = true;
          prevRedDetected = false;
          redHue = hsvTargetFromRgb(DEFAULT_RED_TARGET);
          greenHue = hsvTargetFromRgb(DEFAULT_GREEN_TARGET);
          loop();
          showCalibrationState("攝影機已啟動");
        } catch (err) {
          statusEl.className = "mt-4 rounded-lg border border-rose-400/70 bg-rose-950/50 p-3 text-sm text-rose-200";
          statusEl.textContent = "無法開啟攝影機，請確認權限。";
        }
      });

      calibRedBtn.addEventListener("click", () => {
        if (!hasStarted) {
          statusEl.className = "mt-4 rounded-lg border border-rose-400/70 bg-rose-950/50 p-3 text-sm text-rose-200";
          statusEl.textContent = "請先啟動攝影機，並把紅色物件放在畫面中央再校正。";
          return;
        }
        pendingCalibration = "red";
        calibrationPromptShown = false;
        showCalibrationState("已進入紅色校正模式");
      });

      calibGreenBtn.addEventListener("click", () => {
        if (!hasStarted) {
          statusEl.className = "mt-4 rounded-lg border border-rose-400/70 bg-rose-950/50 p-3 text-sm text-rose-200";
          statusEl.textContent = "請先啟動攝影機，並把黃色物件放在畫面中央再校正。";
          return;
        }
        pendingCalibration = "green";
        calibrationPromptShown = false;
        showCalibrationState("已進入黃色校正模式");
      });
    </script>
  </body>
</html>
